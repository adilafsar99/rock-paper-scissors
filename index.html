<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, Paper and Scissors - UI Version</title>
</head>
<body>
    <div class="container">
       <div class="text">
          <h1>Rock, Paper and Scissors</h1>
          <p>Click on a card to choose and play.</p>
       </div>
       <div class="choice-cards">
          <div class="choice-card">
             <img class="image" alt="A picture of a rock.">
             <p>Rock</p>
          </div>
          <div class="choice-card">
             <img class="image" src="" alt="A picture of a paper.">
             <p>Paper</p>
          </div>
          <div class="choice-card">
             <img class="image" src="" alt="A picture of scissors.">
             <p>Scissors</p>
          </div>
       </div>
    </div>











    <script src="scripts.js"></script>
</body>
</html>
