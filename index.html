<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rock, Paper and Scissors - UI Version</title>
        <link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div class="container">
			<div class="heading">
				<h1>Rock, Paper and Scissors</h1>
			</div>
			<div class="choice-cards">
				<div class="card player-choice-card choice-card">
					<img id="rock-image" class="image" src="./svgs/hand-back-fist-solid-full.svg" alt="A picture of a rock." />
				</div>
				<div class="card player-choice-card choice-card">
					<img id="paper-image" class="image" src="./svgs/hand-solid-full.svg" alt="A picture of a paper." />
				</div>
				<div class="card player-choice-card choice-card">
					<img id="scissors-image" class="image" src="./svgs/hand-scissors-solid-full.svg" alt="A picture of scissors." />
				</div>
			</div>
			<div class="score-cards">
				<div class="card score-card">
					<p class="score-text">Player Score</p>
                    <p class="score" id="player-score">0</p>
				</div>
				<div class="message-screen">
					<p id="message">Click on a card to choose and play.</p>
				</div>
				<div class="card score-card">
					<p class="score-text">Computer Score</p>
                    <p class="score" id="computer-score">0</p>
				</div>
			</div>
			<div class="choice-cards">
				<div id="rock" class="card computer-choice-card choice-card">
					<img src="./svgs/hand-back-fist-solid-full.svg" alt="A picture of a rock." />
				</div>
				<div id="paper" class="card computer-choice-card choice-card">
					<img src="./svgs/hand-solid-full.svg" alt="A picture of a paper." />
				</div>
				<div id="scissors" class="card computer-choice-card choice-card">
					<img src="./svgs/hand-scissors-solid-full.svg" alt="A picture of scissors." />
				</div>
			</div>
			<div class="buttons">
               <button class="invisible" id="reset-btn">Play Again?</button>
			</div>
		</div>

		<script src="scripts.js"></script>
	</body>
</html>
