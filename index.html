<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Rock, Paper and Scissors - UI Version</title>
        <link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div class="container">
			<div class="heading">
				<h1>Rock, Paper and Scissors</h1>
			</div>
			<div class="choice-cards player-cards">
				<div class="choice-card">
					<img class="image" alt="A picture of a rock." />
					<p>Rock</p>
				</div>
				<div class="choice-card">
					<img class="image" src="" alt="A picture of a paper." />
					<p>Paper</p>
				</div>
				<div class="choice-card">
					<img class="image" src="" alt="A picture of scissors." />
					<p>Scissors</p>
				</div>
			</div>
			<div class="score-cards">
				<div class="score-card">
					<p>Player Score</p>
                    <p id="player-score"></p>
				</div>
				<div class="message-screen">
					<p id="message">Click on a card to choose and play.</p>
				</div>
				<div class="score-card">
					<p>Computer Score</p>
                    <p id="computer-score"></p>
				</div>
			</div>
			<div class="choice-cards computer-cards">
				<div class="choice-card">
					<img class="image" alt="A picture of a rock." />
					<p>Rock</p>
				</div>
				<div class="choice-card">
					<img class="image" src="" alt="A picture of a paper." />
					<p>Paper</p>
				</div>
				<div class="choice-card">
					<img class="image" src="" alt="A picture of scissors." />
					<p>Scissors</p>
				</div>
			</div>
			<div class="buttons"></div>
		</div>

		<script src="scripts.js"></script>
	</body>
</html>
